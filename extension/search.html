<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTamer — Smart Tab Search</title>
  <style>
    /* ─── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --border: #d1d1d6;
      --text: #1c1c1e;
      --text-muted: #6c6c70;
      --primary: #007aff;
      --primary-hover: #0062cc;
      --success: #34c759;
      --shadow: rgba(0, 0, 0, 0.08);
      --radius: 10px;
      --highlight: #fff3cd;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #1c1c1e;
        --surface: #2c2c2e;
        --border: #48484a;
        --text: #f5f5f7;
        --text-muted: #98989e;
        --primary: #0a84ff;
        --primary-hover: #409cff;
        --success: #30d158;
        --shadow: rgba(0, 0, 0, 0.3);
        --highlight: #5c4a00;
      }
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --border: #d1d1d6;
      --text: #1c1c1e;
      --text-muted: #6c6c70;
      --primary: #007aff;
      --primary-hover: #0062cc;
      --success: #34c759;
      --shadow: rgba(0, 0, 0, 0.08);
      --highlight: #fff3cd;
    }

    :root[data-theme="dark"] {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --border: #48484a;
      --text: #f5f5f7;
      --text-muted: #98989e;
      --primary: #0a84ff;
      --primary-hover: #409cff;
      --success: #30d158;
      --shadow: rgba(0, 0, 0, 0.3);
      --highlight: #5c4a00;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Search Input ────────────────────────────────────────── */
    .search-container {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input-wrapper .search-icon {
      position: absolute;
      left: 12px;
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
      opacity: 0.5;
    }

    #search-input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      font-size: 16px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent);
    }

    #search-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .search-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    .search-hint kbd {
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      border: 1px solid var(--border);
    }

    /* ─── Status Bar ──────────────────────────────────────────── */
    .status-bar {
      padding: 6px 20px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-bar .count {
      font-weight: 600;
    }

    /* ─── Results List ────────────────────────────────────────── */
    #results-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }

    .result-item:hover,
    .result-item.selected {
      background: var(--surface);
    }

    .result-item.selected {
      border-left: 3px solid var(--primary);
      padding-left: 17px;
    }

    .result-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-title mark {
      background: var(--highlight);
      color: var(--text);
      border-radius: 2px;
      padding: 0 2px;
    }

    .result-url {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .result-url mark {
      background: var(--highlight);
      color: var(--text-muted);
      border-radius: 2px;
      padding: 0 2px;
    }

    .result-group-tag {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-window-label {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ─── Empty / Error States ────────────────────────────────── */
    .empty-state,
    .error-state,
    .loading-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-state {
      color: #ff3b30;
    }

    .loading-state .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Group Color Swatches ────────────────────────────────── */
    .group-color-grey   { background: #b1b1b3; }
    .group-color-blue   { background: #4a86e8; }
    .group-color-red    { background: #e84a4a; }
    .group-color-yellow { background: #e8c34a; }
    .group-color-purple { background: #a34ae8; }
    .group-color-pink   { background: #e84a8e; }
    .group-color-green  { background: #4ae85c; }
    .group-color-orange { background: #e88a4a; }
    .group-color-cyan   { background: #4ae8e8; }

    /* ─── Scrollbar styling ───────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ─── Checkboxes ────────────────────────────────────────── */
    .result-checkbox {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .result-checkbox:hover {
      opacity: 1;
    }

    /* ─── Action Buttons ────────────────────────────────────── */
    .result-actions {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      opacity: 0.4;
      transition: opacity 0.15s;
    }

    .result-item:hover .result-actions {
      opacity: 1;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .action-btn:hover {
      background: var(--bg);
      color: var(--text);
      border-color: var(--primary);
    }

    .action-btn.action-close:hover {
      color: #ff3b30;
      border-color: #ff3b30;
    }

    .action-btn.action-ungroup:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ─── Batch Toolbar ─────────────────────────────────────── */
    .batch-toolbar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 11;
    }

    .batch-toolbar.active {
      display: flex;
    }

    .batch-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: auto;
    }

    .batch-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      background: var(--bg);
      color: var(--text-muted);
    }

    .batch-btn:not(:disabled):hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .batch-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .batch-btn.batch-close:not(:disabled):hover {
      color: #ff3b30;
      border-color: #ff3b30;
    }

    /* ─── Toast ─────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      font-size: 13px;
      font-weight: 500;
      pointer-events: auto;
      animation: toast-in 0.3s ease;
      max-width: 400px;
    }

    .toast.toast-out {
      animation: toast-out 0.3s ease forwards;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toast-out {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .toast-undo {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--primary);
      border-radius: 6px;
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .toast-undo:hover {
      background: color-mix(in srgb, var(--primary) 15%, transparent);
    }

    .toast-dismiss {
      padding: 2px 6px;
      font-size: 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .toast-dismiss:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Search Input -->
  <div class="search-container">
    <span class="search-label">Smart Tab Search</span>
    <div class="search-input-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input"
             placeholder="Search tabs by title, URL, or group…"
             autofocus spellcheck="false" autocomplete="off">
    </div>
    <div class="search-hint">
      <kbd>↑</kbd> <kbd>↓</kbd> navigate · <kbd>Enter</kbd> switch · <kbd>Ctrl+W</kbd> close · <kbd>Ctrl+U</kbd> ungroup · <kbd>Esc</kbd> exit
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span>Showing <span id="result-count" class="count">0</span> of <span id="total-count" class="count">0</span> tabs</span>
    <span id="window-count"></span>
  </div>

  <!-- Batch Toolbar -->
  <div class="batch-toolbar" id="batch-toolbar">
    <span class="batch-count" id="batch-count">0 selected</span>
    <button class="batch-btn batch-ungroup" id="batch-ungroup-btn" disabled>Ungroup Selected</button>
    <button class="batch-btn batch-close" id="batch-close-btn" disabled>Close Selected</button>
  </div>

  <!-- Results -->
  <div id="results-container" role="listbox">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading tabs…
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="search.js"></script>
</body>
</html>
